<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JASS X MODZ STORE</title>
    <style>
        :root {
            --primary: #00e5ff;
            --bg: #050505;
            --card-bg: #111111;
            --text: #ffffff;
            --neon-glow: 0 0 15px rgba(0, 229, 255, 0.4);
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header-title {
            font-size: 32px;
            font-weight: bold;
            color: #ff0055; /* Reddish-pink like your image */
            text-transform: uppercase;
            letter-spacing: 2px;
            margin-bottom: 30px;
            text-shadow: 0 0 10px rgba(255, 0, 85, 0.3);
        }

        /* --- Project Cards --- */
        #store-page {
            width: 100%;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid #222;
            box-shadow: var(--neon-glow);
        }

        .card h2 {
            color: var(--primary);
            margin: 0 0 15px 0;
            font-size: 20px;
            border-bottom: 1px solid #222;
            padding-bottom: 10px;
        }

        .price-row {
            display: flex;
            justify-content: space-between;
            margin: 8px 0;
            color: #ccc;
            font-size: 15px;
        }

        .price-val { color: #888; }

        /* --- Payment UI --- */
        #payment-page {
            display: none;
            width: 100%;
            max-width: 400px;
            background: #000;
            border-radius: 20px;
            padding: 20px;
            border: 2px solid var(--primary);
            position: relative;
        }

        .payment-header {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 20px;
        }

        .qr-section {
            background: #111;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
        }

        .qr-section img {
            width: 100%;
            max-width: 250px;
            border-radius: 10px;
            border: 5px solid white;
        }

        .input-group {
            margin-bottom: 15px;
        }

        .input-group label {
            display: block;
            color: var(--primary);
            margin-bottom: 8px;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px;
            background: #1a1a1a;
            border: 1px solid #333;
            color: white;
            border-radius: 8px;
            box-sizing: border-box;
        }

        /* --- Buttons --- */
        .btn {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            text-transform: uppercase;
            margin-top: 10px;
            transition: 0.3s;
        }

        .buy-btn { background: #ff0055; color: white; }
        .confirm-btn { background: var(--primary); color: black; }
        .cancel-btn { background: #333; color: white; }
        .download-btn { background: #00ffa3; color: black; display: none; }
        .pending-btn { background: #222; color: #555; cursor: not-allowed; display: none; }

        /* Admin Section Toggle */
        #admin-panel { display: none; margin-top: 30px; width: 100%; max-width: 400px; background: #111; padding: 20px; border-radius: 15px; }
    </style>
</head>
<body>

    <div class="header-title">JASS X MODZ STORE</div>

    <div id="store-page">
        <p style="text-align: center; color: #555;">Loading Store Database...</p>
    </div>

    <div id="payment-page">
        <div class="payment-header">
            <span>💠</span> Complete Payment
        </div>
        
        <div style="background:#111; padding:15px; border-radius:10px; text-align:center; margin-bottom:15px;">
            <p style="color:#888; margin:0">Total Amount to Pay</p>
            <h1 style="color:#00ffa3; margin:5px 0">₹<span id="target-price">0</span></h1>
        </div>

        <div class="qr-section">
            <img src="https://i.ibb.co/7t1TbYV4/10349.jpg" alt="QR Code">
        </div>

        <div class="input-group">
            <label>Rs Enter Your Amount</label>
            <input type="number" id="pay-amt" placeholder="Enter amount you paid">
        </div>

        <div class="input-group">
            <label>🎫 UTR ID / Transaction ID</label>
            <input type="text" id="pay-utr" placeholder="Enter 12 digit UTR ID">
        </div>

        <button class="btn confirm-btn" onclick="submitToAdmin()">✓ Confirm Order</button>
        <button class="btn cancel-btn" onclick="closePay()">✕ Cancel</button>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCNaAc3i4UOK57CJaeT96coTlKxfC-7kgk",
            authDomain: "dark-devil-bhai.firebaseapp.com",
            databaseURL: "https://dark-devil-bhai-default-rtdb.firebaseio.com",
            projectId: "dark-devil-bhai",
            storageBucket: "dark-devil-bhai.firebasestorage.app",
            messagingSenderId: "599566539258",
            appId: "1:599566539258:web:470f32fa0489ff3257ec43"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // Load Projects and track status
        onValue(ref(db, 'projects'), (snapshot) => {
            const container = document.getElementById('store-page');
            container.innerHTML = "";
            const data = snapshot.val();
            
            if(data) {
                Object.keys(data).forEach(key => {
                    const p = data[key];
                    const card = `
                        <div class="card" id="card-${key}">
                            <h2>${p.name}</h2>
                            <div class="price-row"><span>1 Day</span> <span class="price-val">${p.price}.00 INR</span></div>
                            <div class="price-row"><span>7 Days</span> <span class="price-val">Special Offer</span></div>
                            <div id="action-${key}">
                                <button class="btn buy-btn" onclick="openPayment('${p.price}', '${key}')">BUY NOW</button>
                            </div>
                        </div>
                    `;
                    container.innerHTML += card;

                    // Check for existing requests in LocalStorage
                    const reqId = localStorage.getItem("req_" + key);
                    if(reqId) {
                        onValue(ref(db, 'requests/' + reqId), (reqSnap) => {
                            const req = reqSnap.val();
                            const actionDiv = document.getElementById('action-' + key);
                            if(req && req.status === 'pending') {
                                actionDiv.innerHTML = `<button class="btn pending-btn" style="display:block">⏳ WAITING APPROVAL</button>`;
                            } else if(req && req.status === 'approved') {
                                actionDiv.innerHTML = `<a href="${p.link}" class="btn download-btn" style="display:block; text-align:center">📥 DOWNLOAD NOW</a>`;
                            }
                        });
                    }
                });
            }
        });

        // Submit to Admin
        window.submitToAdmin = () => {
            const amt = document.getElementById('pay-amt').value;
            const utr = document.getElementById('pay-utr').value;
            if(!amt || !utr) return alert("Fill all details!");

            const reqId = "REQ_" + Date.now();
            set(ref(db, 'requests/' + reqId), {
                projectId: window.currentPid,
                amount: amt,
                utr: utr,
                status: 'pending'
            }).then(() => {
                localStorage.setItem("req_" + window.currentPid, reqId);
                alert("Order sent! Admin will verify your UTR.");
                closePay();
                window.open("https://t.me/jasnoor_p2", "_blank");
            });
        };
    </script>

    <script>
        function openPayment(price, id) {
            window.currentPid = id;
            document.getElementById('store-page').style.display = 'none';
            document.getElementById('payment-page').style.display = 'block';
            document.getElementById('target-price').innerText = price;
            window.scrollTo(0,0);
        }

        function closePay() {
            document.getElementById('payment-page').style.display = 'none';
            document.getElementById('store-page').style.display = 'flex';
        }
    </script>
</body>
</html>
